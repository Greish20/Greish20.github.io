<style>
    /* Estilos para el efecto brillante */
    .hero-header { text-align: center; padding: 80px 20px; }
    
    .badge { 
        display: inline-block; padding: 8px 20px; border: 1px solid #1e40af; 
        border-radius: 50px; font-size: 0.8rem; color: #38bdf8; 
        background: rgba(30, 64, 175, 0.2); margin-bottom: 20px;
        letter-spacing: 2px;
    }

    .hero-title { 
        font-size: 3.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 10px;
    }
    
    /* El degradado de colores */
    .gradient-text {
        background: linear-gradient(90deg, #fff, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .hero-subtitle { color: #94a3b8; font-size: 1.2rem; margin-bottom: 40px; }

    /* Cuadrícula de información */
    .info-grid { 
        display: grid; grid-template-columns: repeat(3, 1fr); 
        gap: 20px; max-width: 900px; margin: 0 auto; 
    }
    .info-box { 
        padding: 20px; border: 1px solid #1e293b; border-radius: 15px;
        background: rgba(15, 23, 42, 0.5);
    }
    .info-label { color: #64748b; font-size: 0.75rem; text-transform: uppercase; }
    .info-value { color: #f1f5f9; font-weight: bold; margin-top: 5px; }
</style>

<header class="hero-header">
    <div class="badge">I SEMESTRE 2026</div>
    <h1 class="hero-title gradient-text">Organización y Arquitectura de Computadoras</h1>
    <p class="hero-subtitle">Portafolio Digital de Laboratorios, Investigaciones y Avances Tecnológicos</p>

    <div class="info-grid">
        <div class="info-box">
            <div class="info-label">Grupo Académico</div>
            <div class="info-value">2IL141</div>
        </div>
        <div class="info-box">
            <div class="info-label">Grupo de Lab.</div>
            <div class="info-value">Grupo 4</div>
        </div>
        <div class="info-box">
