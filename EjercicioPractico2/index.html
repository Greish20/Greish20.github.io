<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Práctico 2 | Greishel M. Serrano C.</title>
    <style>
        /* Animación de entrada suave */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        body { 
            background-color: #fdf6f7; 
            color: #4a4a4a; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        .box { 
            background: white; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(255, 128, 171, 0.2); 
            max-width: 700px;
            animation: fadeIn 0.8s ease-out; /* Aplicar animación */
        }

        h1 { color: #d81b60; }
        
        /* Efecto brillante en los botones */
        .btn { 
            padding: 12px 25px; 
            border-radius: 50px; /* Botones estilo píldora */
            text-decoration: none; 
            font-weight: 600; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: inline-block;
            margin: 5px;
        }
        
        .btn:hover { 
            transform: scale(1.05); /* Efecto zoom suave */
            filter: brightness(1.2); /* Efecto brillo */
        }
        
        .btn-pdf { background: #ff80ab; color: white; }
        .btn-pkt { background: #4a90e2; color: white; }
        .btn-zip { background: #28a745; color: white; }
        
        .nav { margin-top: 30px; }
        .nav a { color: #d81b60; text-decoration: none; font-weight: bold; padding: 10px; }
        .nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="box">
        <h1>Ejercicio Práctico 2</h1>
        <p>Proyectos técnicos integrados:</p>
        
        <div class="button-group">
            <a href="EjercicioPráctico2.pdf" class="btn btn-pdf" target="_blank">📎 Informe PDF</a>
            <a href="EJERCICIO2.pkt" class="btn btn-pkt">🌐 Red (.pkt)</a>
            <a href="MobileBotica.zip" class="btn btn-zip">📦 App Android (.zip)</a>
        </div>
    </div>

    <div class="nav">
        <a href="../index.html">← Volver al inicio</a>
    </div>

</body>
</html>
